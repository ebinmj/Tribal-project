<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King Dashboard</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
    padding:30px;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:2.3rem;
    color:white;
    text-shadow:0 2px 10px rgba(0,0,0,.4);
}

table{
    width:100%;
    max-width:1400px;
    margin:20px auto;
    border-collapse:collapse;

    background:rgba(255,255,255,.12);
    backdrop-filter:blur(14px);

    border-radius:18px;
    overflow:hidden;

    box-shadow:0 8px 30px rgba(0,0,0,.25);
}

th{
    background:rgba(20,90,50,.9);
    color:white;
    font-weight:600;
    letter-spacing:.5px;
}

th,td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid rgba(255,255,255,.1);
}

tr:hover{
    background:rgba(255,255,255,.08);
}

.status{
    font-weight:600;
    padding:6px 12px;
    border-radius:20px;
}

.status.pending{
    background:#ffd54f22;
    color:#ffd54f;
    border:1px solid #ffd54f55;
}

.status.accepted{
    background:#66ff9922;
    color:#66ff99;
    border:1px solid #66ff9955;
}

.status.rejected{
    background:#ff767522;
    color:#ff7675;
    border:1px solid #ff767555;
}

button{
    width:auto;
    padding:10px 18px;
    font-weight:600;
    border:none;
    transition:.3s;
}

.accept{
    background:linear-gradient(135deg,#2ecc71,#27ae60);
}

.reject{
    background:linear-gradient(135deg,#ff5f6d,#d63031);
}

.accept:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(46,204,113,.4);
}

.reject:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(255,95,109,.4);
}

.empty{
    text-align:center;
    color:#ddd;
    font-style:italic;
}

@media(max-width:768px){
    body{
        padding:15px;
    }

    table{
        font-size:13px;
    }

    th,td{
        padding:10px;
    }
}
</style>

</head>

<body>

<h2>Tribal Appointment Management</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Date</th>
<th>Time</th>
<th>Reason</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="kingTable"></tbody>
</table>

<script>

async function loadBookings() {
  try {

    const res = await fetch("/api/king/bookings");
    const bookings = await res.json();

    const tbody = document.getElementById("kingTable");
    tbody.innerHTML = "";

    if(bookings.length === 0){
      tbody.innerHTML = `
      <tr>
        <td colspan="7" class="empty">
          No booking requests available
        </td>
      </tr>`;
      return;
    }

    bookings.forEach(b => {

      tbody.innerHTML += `
        <tr>

          <td>${b.name}</td>

          <td>${b.email}</td>

          <td>${b.date}</td>

          <td>${b.time}</td>

          <td>${b.reason}</td>

          <td>
            <span class="status ${b.status}">
              ${b.status}
            </span>
          </td>

          <td>

            ${b.status === 'pending'
              ?

              `<button
                class="accept"
                onclick="processBooking('${b._id}','accept')">
                Accept
              </button>

              <button
                class="reject"
                onclick="processBooking('${b._id}','reject')">
                Reject
              </button>`

              : '-'
            }

          </td>

        </tr>
      `;
    });

  } catch (err) {
    console.error(err);
  }
}

async function processBooking(id, action) {

  try {

    const res =
      await fetch(`/api/booking/${id}/${action}`);

    if(res.ok){

      alert(`Booking ${action}ed successfully`);

      loadBookings();

    }else{

      alert("Failed to process booking");

    }

  } catch(err){

    console.error(err);

  }
}

loadBookings();

/* Auto refresh every 10 seconds */
setInterval(loadBookings,10000);

</script>

</body>
</html>
